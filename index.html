<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الطفل العالمية - مقاعد بوابة الطفل العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <header class="bg-white shadow-sm py-8 text-center border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col items-center gap-2 relative px-4">
            <div class="text-5xl mb-2 select-none">🏰</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">بوابة الطفل العالمية</h1>
            <p class="text-sm font-semibold text-emerald-600 bg-emerald-50 px-4 py-1.5 rounded-full mt-1 border border-emerald-100">
                مقاعد بوابة الطفل العالمية
            </p>
            <button onclick="loadData()" class="mt-3 text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition-colors font-bold cursor-pointer">
                🔄 تحديث البيانات الحية
            </button>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto p-6 my-auto">
        <div id="stages-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="text-center py-5 text-xs text-slate-400 border-t border-slate-100 bg-white mt-8">
        جميع البيانات محفوظة ومزامنة سحابياً بشكل مباشر بين جميع الأجهزة.
    </footer>

    <script>
        // رابط المخزن السحابي الموحد والمخصص لكِ لحفظ الأرقام بطلب واحد ذكي
        const CLOUD_URL = "https://kvdb.io/M7p9W2xKq5V1z4Rt_kidsgate/admission_counts"; 
        
        let currentCounts = {};

        const STAGES = {
            prekg: { name: "Pre-KG", max: 20, desc: "فصل مستقل", bg: "emerald" },
            kg1_c1: { name: "KG 1 - فصل 1", max: 30, desc: "فصل مستقل", bg: "emerald" },
            kg1_c2: { name: "KG 1 - فصل 2", max: 30, desc: "فصل مستقل", bg: "emerald" },
            kg1_c3: { name: "KG 1 - فصل 3", max: 30, desc: "فصل مستقل", bg: "emerald" },
            kg2_c1: { name: "KG II - فصل 1", max: 25, desc: "فصل مستقل", bg: "emerald" },
            kg2_c2: { name: "KG II - فصل 2", max: 25, desc: "فصل مستقل", bg: "emerald" },
            g1_girls: { name: "Grade 1 - بنات", max: 20, desc: "فصل واحد", bg: "amber" },
            g1_boys: { name: "Grade 1 - أولاد", max: 20, desc: "فصل واحد", bg: "sky" },
            g2_girls: { name: "Grade 2 - بنات", max: 20, desc: "فصل واحد", bg: "amber" },
            g2_boys: { name: "Grade 2 - أولاد", max: 20, desc: "فصل واحد", bg: "sky" },
            g3_girls: { name: "Grade 3 - بنات", max: 20, desc: "فصل واحد", bg: "amber" },
            g3_boys: { name: "Grade 3 - أولاد", max: 25, desc: "فصل واحد", bg: "sky" },
            g4_girls: { name: "Grade 4 - بنات", max: 20, desc: "فصل واحد", bg: "amber" }
        };

        // --- بناء بطاقات الواجهة ---
        function renderCards() {
            const grid = document.getElementById("stages-grid");
            grid.innerHTML = ""; 

            for (let key in STAGES) {
                const stage = STAGES[key];
                let badgeColor = "bg-emerald-50 text-emerald-700 border border-emerald-100";
                if (stage.bg === "amber") badgeColor = "bg-amber-50 text-amber-700 border border-amber-100";
                if (stage.bg === "sky") badgeColor = "bg-sky-50 text-sky-700 border border-sky-100";

                const cardHtml = `
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 flex flex-col justify-between transition-all hover:shadow-md" id="card-${key}">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="${badgeColor} text-xs font-bold px-3 py-1 rounded-full">${stage.desc}</span>
                                <span id="badge-${key}" class="text-xs font-bold px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200">متاح</span>
                            </div>
                            <h3 class="text-xl font-extrabold text-slate-800 mb-2">${stage.name}</h3>
                            <p class="text-sm text-slate-500 mb-4">السعة السنوية: ${stage.max} مقعد</p>
                            
                            <div class="w-full bg-slate-100 rounded-full h-3 mb-4 overflow-hidden border border-slate-200">
                                <div id="progress-${key}" class="h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div>
                            <div class="text-center my-4">
                                <span id="count-${key}" class="text-4xl font-black text-slate-900">0</span>
                                <span class="text-slate-500 text-sm"> / ${stage.max} طالب</span>
                            </div>
                            <div class="flex gap-2.5 mt-3">
                                <button onclick="updateSeat('${key}', 'up')" class="flex-1 bg-slate-950 hover:bg-slate-800 text-white font-extrabold py-3 rounded-xl text-lg transition-colors cursor-pointer">+</button>
                                <button onclick="updateSeat('${key}', 'down')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold py-3 rounded-xl text-lg transition-colors cursor-pointer">-</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            }
        }

        // --- جلب البيانات السحابية الموحدة في طلب واحد مجتمع ---
        async function loadData() {
            // خطوة 1: عرض الكاش المحلي أولاً كدعم سريع
            for (let key in STAGES) {
                const localVal = localStorage.getItem(`kg_v3_${key}`);
                currentCounts[key] = localVal !== null ? parseInt(localVal) : 0;
                updateUI(key, currentCounts[key]);
            }

            // خطوة 2: جلب اللقطة الكاملة للأرقام من السحاب بطلب واحد فقط
            try {
                const response = await fetch(CLOUD_URL);
                if (response.ok) {
                    const cloudData = await response.json();
                    if (cloudData && typeof cloudData === 'object') {
                        currentCounts = cloudData;
                        // تحديث الشاشة بالكامل بناءً على بيانات السحاب الموحدة
                        for (let key in STAGES) {
                            if (currentCounts[key] === undefined) currentCounts[key] = 0;
                            localStorage.setItem(`kg_v3_${key}`, currentCounts[key]);
                            updateUI(key, currentCounts[key]);
                        }
                    }
                } else if (response.status === 404) {
                    // إذا كان السحاب فارغاً تماماً في البداية، نقوم بتهيئته
                    await saveToCloud();
                }
            } catch (error) {
                console.warn("يعمل بالوضع المحلي الاحتياطي حالياً.");
            }
        }

        // --- حفظ البيانات بالكامل في لقطة سحابية واحدة ---
        async function saveToCloud() {
            try {
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    body: JSON.stringify(currentCounts)
                });
            } catch (error) {
                console.error("عطل مؤقت في حفظ السحاب:", error);
            }
        }

        // --- تحديث الألوان والواجهات المتفاعلة ---
        function updateUI(key, value) {
            if (value === undefined || isNaN(value) || value < 0) value = 0;
            
            const stage = STAGES[key];
            document.getElementById(`count-${key}`).innerText = value;
            
            const percentage = Math.min((value / stage.max) * 100, 100);
            const progressBar = document.getElementById(`progress-${key}`);
            const badge = document.getElementById(`badge-${key}`);
            
            progressBar.style.width = `${percentage}%`;
            
            if (value >= stage.max) {
                badge.innerText = "اكتملت المقاعد";
                badge.className = "text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-700 border border-red-200";
                progressBar.className = "bg-red-500 h-3 rounded-full";
            } else {
                badge.innerText = "متاح";
                badge.className = "text-xs font-bold px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200";
                
                if (stage.bg === 'emerald') progressBar.className = "bg-emerald-500 h-3 rounded-full";
                if (stage.bg === 'amber') progressBar.className = "bg-amber-500 h-3 rounded-full";
                if (stage.bg === 'sky') progressBar.className = "bg-sky-500 h-3 rounded-full";
            }
        }

        // --- التعديل المباشر والحفظ الموحد ---
        async function updateSeat(key, action) {
            const stage = STAGES[key];
            let current = currentCounts[key] || 0;

            if (action === 'up' && current >= stage.max) {
                alert(`عذراً! تم اكتمال المقاعد تماماً في ${stage.name}`);
                return;
            }
            if (action === 'down' && current <= 0) {
                alert(`العداد حالياً عند الصفر في ${stage.name}`);
                return;
            }

            // 1. التحديث المحلي الفوري
            if (action === 'up') currentCounts[key]++;
            else currentCounts[key]--;

            localStorage.setItem(`kg_v3_${key}`, currentCounts[key]);
            updateUI(key, currentCounts[key]);

            // 2. المزامنة السحابية الفورية الشاملة
            await saveToCloud();
        }

        window.onload = function() {
            renderCards();
            loadData();
        };
    </script>
</body>
</html>
